x-app: &app
  build:
    context: .
  image: drexor-python:latest
  env_file:
    - path: .env
      required: false

services:
  api:
    <<: *app
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    <<: *app
    command: ["python", "-m", "app.worker"]
